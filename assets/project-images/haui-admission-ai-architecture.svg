<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HaUI Admission AI architecture</title>
  <desc id="desc">A high-level architecture diagram showing official admissions sources flowing through retrieval, an API, a web application, citations, and human handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050B18"/><stop offset="1" stop-color="#10102A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#38BDF8"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#38BDF8">
    <path d="M0 90H1280M0 180H1280M0 270H1280M0 360H1280M0 450H1280M0 540H1280M0 630H1280"/>
    <path d="M160 0V720M320 0V720M480 0V720M640 0V720M800 0V720M960 0V720M1120 0V720"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="70" y="80" fill="#F4F8FC" font-size="37" font-weight="700">HaUI Admission AI</text>
    <text x="70" y="118" fill="#8FA8BE" font-size="18">Source-grounded admissions guidance with citations and human handoff</text>
    <rect x="70" y="142" width="265" height="4" rx="2" fill="url(#line)"/>

    <g filter="url(#shadow)">
      <rect x="70" y="230" width="215" height="180" rx="22" fill="#0A1A2C" stroke="#38BDF8" stroke-opacity="0.42"/>
      <rect x="360" y="230" width="240" height="180" rx="22" fill="#0A1A2C" stroke="#38BDF8" stroke-opacity="0.42"/>
      <rect x="675" y="230" width="240" height="180" rx="22" fill="#0A1A2C" stroke="#A78BFA" stroke-opacity="0.50"/>
      <rect x="990" y="230" width="220" height="180" rx="22" fill="#0A1A2C" stroke="#A78BFA" stroke-opacity="0.50"/>
    </g>

    <g fill="#F4F8FC" font-size="21" font-weight="650" text-anchor="middle">
      <text x="177" y="278">Official Sources</text>
      <text x="480" y="278">RAG Service</text>
      <text x="795" y="278">FastAPI</text>
      <text x="1100" y="278">React / Vite</text>
    </g>
    <g fill="#9FB3C8" font-size="16" text-anchor="middle">
      <text x="177" y="318">Admissions documents</text><text x="177" y="344">Programs · Fees · Scores</text><text x="177" y="370">Year-aware content</text>
      <text x="480" y="318">Chunking · Embeddings</text><text x="480" y="344">Vector retrieval</text><text x="480" y="370">Grounded generation</text>
      <text x="795" y="318">REST endpoints</text><text x="795" y="344">Session + ticket logic</text><text x="795" y="370">PostgreSQL</text>
      <text x="1100" y="318">Public chat</text><text x="1100" y="344">Advisor dashboard</text><text x="1100" y="370">Admin workflows</text>
    </g>

    <g fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M285 320H345"/><path d="M600 320H660"/><path d="M915 320H975"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="252" y="510" width="248" height="105" rx="18" fill="#0B2133" stroke="#22D3EE" stroke-opacity="0.45"/>
      <rect x="516" y="510" width="248" height="105" rx="18" fill="#0B2133" stroke="#22D3EE" stroke-opacity="0.45"/>
      <rect x="780" y="510" width="248" height="105" rx="18" fill="#17152F" stroke="#A78BFA" stroke-opacity="0.55"/>
    </g>
    <g text-anchor="middle">
      <text x="376" y="553" fill="#7DD3FC" font-size="19" font-weight="650">Citations</text>
      <text x="376" y="582" fill="#9FB3C8" font-size="15">Evidence users can inspect</text>
      <text x="640" y="553" fill="#7DD3FC" font-size="19" font-weight="650">Safe Refusal</text>
      <text x="640" y="582" fill="#9FB3C8" font-size="15">No source, no confident answer</text>
      <text x="904" y="553" fill="#C4B5FD" font-size="19" font-weight="650">Human Handoff</text>
      <text x="904" y="582" fill="#9FB3C8" font-size="15">Escalation to an advisor</text>
    </g>
    <path d="M1100 410V462H376V495M640 462V495M904 462V495" fill="none" stroke="url(#line)" stroke-width="3" stroke-opacity="0.7"/>
    <g fill="#38BDF8"><circle cx="376" cy="462" r="5"/><circle cx="640" cy="462" r="5"/></g>
    <circle cx="904" cy="462" r="5" fill="#A78BFA"/>
  </g>
  <rect x="1" y="1" width="1278" height="718" rx="27" fill="none" stroke="url(#line)" stroke-opacity="0.25" stroke-width="2"/>
</svg>
