<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">Nguyễn Bùi Tấn Dũng — Haru</title>
  <desc id="desc">Mobile profile banner for a Robotics and AI graduate building practical AI systems.</desc>
  <defs>
